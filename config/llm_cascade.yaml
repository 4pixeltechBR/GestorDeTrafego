# Cascata de APIs por Agente
# O sistema tenta o primeiro provedor; se falhar (429/timeout), pula para o próximo.
# Modelos validados para LiteLLM (Março 2026)

orchestrator:
  name: "Orquestrador"
  description: "Cérebro do sistema. Interpreta briefings e coordena agentes."
  models:
    - provider: groq
      model: "groq/llama-3.3-70b-versatile"
      max_tokens: 4096
    - provider: google
      model: "gemini/gemini-2.0-flash"
      max_tokens: 4096

copywriter:
  name: "Copywriter"
  description: "Gera textos persuasivos para anúncios."
  models:
    - provider: google
      model: "gemini/gemini-2.0-flash"
      max_tokens: 2048
    - provider: groq
      model: "groq/llama-3.3-70b-versatile"
      max_tokens: 2048

compliance:
  name: "Compliance"
  description: "Valida copies contra políticas de anúncio do Meta."
  models:
    - provider: groq
      model: "groq/llama-3.3-70b-versatile"
      max_tokens: 1024
    - provider: google
      model: "gemini/gemini-2.0-flash"
      max_tokens: 1024

executor:
  name: "Executor"
  description: "Monta JSONs validados para a Meta API."
  models:
    - provider: groq
      model: "groq/llama-3.3-70b-versatile"
      max_tokens: 4096
    - provider: google
      model: "gemini/gemini-2.0-flash"
      max_tokens: 4096

analyst:
  name: "Analista"
  description: "Analisa métricas de campanhas e sugere otimizações."
  models:
    - provider: google
      model: "gemini/gemini-2.0-flash"
      max_tokens: 4096
    - provider: groq
      model: "groq/llama-3.3-70b-versatile"
      max_tokens: 4096
